        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            color: #2c3e50;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        h1:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #2c3e50);
            border-radius: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-top: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .website-info {
            background-color: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .website-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 25px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .website-details {
            flex: 1;
        }

        .website-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .website-url {
            color: #3498db;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .website-description {
            color: #555;
            max-width: 700px;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .timeline-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .timeline-subtitle {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .sort-indicator {
            display: flex;
            align-items: center;
            background-color: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            font-weight: 600;
            color: #2c3e50;
        }

        .sort-indicator i {
            margin-right: 8px;
            color: #3498db;
        }

        .timeline-container {
            position: relative;
            padding: 20px 0;
        }

        /* 時間軸左側垂直線 */
        .timeline-container:before {
            content: '';
            position: absolute;
            left: 30px;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, #3498db, #2c3e50);
            border-radius: 3px;
        }

        .timeline-item {
            display: flex;
            padding-left: 80px;
            position: relative;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s ease;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-content {
            background-color: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 900px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .timeline-content:hover {
            transform: translateY(-5px);
        }

        .timeline-content:after {
            content: '';
            position: absolute;
            top: 25px;
            left: -15px;
            width: 0;
            height: 0;
            border-right: 15px solid white;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
        }

        .timeline-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #3498db;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .timeline-date i {
            margin-right: 8px;
        }

        .timeline-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .timeline-description {
            color: #555;
            margin-bottom: 15px;
        }

        .timeline-milestone {
            display: inline-block;
            background-color: #f1f8ff;
            color: #3498db;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .timeline-milestone i {
            margin-right: 5px;
        }

        /* 時間軸節點標記 */
        .timeline-item:before {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: white;
            border: 6px solid #3498db;
            border-radius: 50%;
            top: 25px;
            left: 18px;
            z-index: 1;
        }

        /* 不同顏色的里程碑 */
        .timeline-item.red:before {
            border-color: #e74c3c;
        }

        .timeline-item.green:before {
            border-color: #2ecc71;
        }

        .timeline-item.orange:before {
            border-color: #e67e22;
        }

        .timeline-item.purple:before {
            border-color: #9b59b6;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: white;
            border: 2px solid #3498db;
            color: #3498db;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background-color: #3498db;
            color: white;
        }

        .filter-btn.active {
            background-color: #3498db;
            color: white;
        }

        .sort-controls {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .sort-btn {
            background-color: white;
            border: 2px solid #2c3e50;
            color: #2c3e50;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .sort-btn i {
            margin-right: 8px;
        }

        .sort-btn:hover {
            background-color: #2c3e50;
            color: white;
        }

        .sort-btn.active {
            background-color: #2c3e50;
            color: white;
        }

        .current-indicator {
            background-color: rgba(52, 152, 219, 0.1);
            border-left: 4px solid #3498db;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
        }

        .current-indicator .label {
            font-weight: 600;
            color: #3498db;
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .current-indicator .label i {
            margin-right: 8px;
        }

        .current-indicator .text {
            color: #555;
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #7f8c8d;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .timeline-container:before {
                left: 20px;
            }

            .timeline-item {
                padding-left: 60px;
            }

            .timeline-item:before {
                left: 8px;
            }

            .timeline-content:after {
                left: -15px;
                border-right: 15px solid white;
                border-left: none;
            }

            .website-info {
                flex-direction: column;
                text-align: center;
            }

            .website-logo {
                margin-right: 0;
                margin-bottom: 20px;
            }

                flex-direction: column;
                align-items: flex-start;
            }

				justify-content: center;

				min-width: 140px;
				max-width: 300px;
				text-align: center;
				margin: 0;
			}
			.sort-controls {
				flex-direction: column;
				align-items: center;
			}

			.sort-btn {
				width: 100%;
				max-width: 300px;
				text-align: center;
			}
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 取得時間軸數據
            const timelineData = JSON.parse(document.getElementById('timeline-data').textContent);
            const timelineContainer = document.getElementById('timeline-container');
            let isInverted = true; // 開始時使用倒序（最新優先）
            
            // 渲染時間軸項目的函數
            function renderTimeline(items, inverted = true) {
                // 清空容器
                timelineContainer.innerHTML = '';
                
                // 根據倒序參數排序項目
                let itemsToRender;
                if (inverted) {
                    // 倒序（最新優先）- 反轉數組
                    itemsToRender = [...items].reverse();
                } else {
                    // 正序（最早優先）
                    itemsToRender = [...items];
                }
                
                // 將項目新增至時間軸
                itemsToRender.forEach((item, index) => {
                    const timelineItem = document.createElement('div');
                    timelineItem.className = 'timeline-item';
                    timelineItem.setAttribute('data-category', item.category);
                    
                    // 根據類別指派顏色
                    let colorClass = '';
                    switch(item.category) {
                        case 'launch': colorClass = 'green'; break;
                        case 'design': colorClass = 'orange'; break;
                        case 'feature': colorClass = 'purple'; break;
                        case 'growth': colorClass = 'red'; break;
                        default: colorClass = 'green';
                    }
                    
                    timelineItem.classList.add(colorClass);
                    
                    // 建立時間軸專案的HTML
                    timelineItem.innerHTML = `
                        <div class="timeline-content">
                            <div class="timeline-date"><i class="fas fa-${item.icon}"></i> ${item.date}</div>
                            <h3 class="timeline-title">${item.title}</h3>
                            <p class="timeline-description">${item.description}</p>
                            <span class="timeline-milestone"><i class="fas fa-flag"></i> ${item.milestone}</span>
                        </div>
                    `;
                    
                    timelineContainer.appendChild(timelineItem);
                });
                
                // 更新排序指示器文本
                const sortIndicator = document.querySelector('.sort-indicator');
                const sortBtn = document.getElementById('toggle-sort');
                const currentIndicatorText = document.querySelector('.current-indicator .text');
                
                if (inverted) {
                    sortIndicator.innerHTML = '<i class="fas fa-sort-amount-down"></i> 最新優先';
                    sortBtn.innerHTML = '<i class="fas fa-exchange-alt"></i> 切換到正序時間線';
                    currentIndicatorText.textContent = "您正在以倒序方式查看時間軸（最新事件優先）。使用下方按鈕切換到正序時間軸。";
                } else {
                    sortIndicator.innerHTML = '<i class="fas fa-sort-amount-up"></i> 最早優先';
                    sortBtn.innerHTML = '<i class="fas fa-exchange-alt"></i> 切換到倒序時間線';
                    currentIndicatorText.textContent = "您正在以正序方式查看時間軸（最早事件優先）。使用下方按鈕切換到倒序時間軸。";
                }
                
                // 渲染後初始化動畫和濾鏡
                initializeAnimations();
                initializeFilters();
            }
            
            // 以倒序時間軸初始化
            renderTimeline(timelineData, true);
            
            // 切換排序順序
            document.getElementById('toggle-sort').addEventListener('click', function() {
                isInverted = !isInverted;
                renderTimeline(timelineData, isInverted);
            });
            
            // 初始化動畫
            function initializeAnimations() {
                // 檢查元素是否在視窗中
                function isElementInViewport(el) {
                    const rect = el.getBoundingClientRect();
                    return (
                        rect.top <= (window.innerHeight || document.documentElement.clientHeight) * 0.8 &&
                        rect.bottom >= 0
                    );
                }

                // 將可見類別新增至視窗中的時間軸項目
                function showTimelineItems() {
                    const timelineItems = document.querySelectorAll('.timeline-item');
                    timelineItems.forEach(item => {
                        if (isElementInViewport(item)) {
                            item.classList.add('visible');
                        }
                    });
                }

                // 初始檢查
                showTimelineItems();

                // 滾動時檢查
                window.addEventListener('scroll', showTimelineItems);
            }
            
            // 初始化過濾器
            function initializeFilters() {
                const filterButtons = document.querySelectorAll('.filter-btn');
                const timelineItems = document.querySelectorAll('.timeline-item');

                filterButtons.forEach(button => {
                    button.addEventListener('click', function() {
                        // 從所有按鈕中移除活動類
                        filterButtons.forEach(btn => btn.classList.remove('active'));
                        
                        // 為點擊的按鈕新增活動類
                        this.classList.add('active');
                        
                        const filterValue = this.getAttribute('data-filter');
                        
                        // 根據過濾器顯示/隱藏時間軸項目
                        timelineItems.forEach(item => {
                            if (filterValue === 'all') {
                                item.style.display = 'flex';
                                // 觸發重排以重新啟動動畫
                                void item.offsetWidth;
                                if (isElementInViewport(item)) {
                                    item.classList.add('visible');
                                }
                            } else {
                                const category = item.getAttribute('data-category');
                                if (category === filterValue) {
                                    item.style.display = 'flex';
                                    // 觸發重排以重新啟動動畫
                                    void item.offsetWidth;
                                    if (isElementInViewport(item)) {
                                        item.classList.add('visible');
                                    }
                                } else {
                                    item.style.display = 'none';
                                }
                            }
                        });
                        
                        // 視口檢查的輔助函數
                        function isElementInViewport(el) {
                            const rect = el.getBoundingClientRect();
                            return (
                                rect.top <= (window.innerHeight || document.documentElement.clientHeight) * 0.8 &&
                                rect.bottom >= 0
                            );
                        }
                    });
                });
            }
        });
    </script>
